apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general-purpose
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.azure.com
        kind: AKSNodeClass
        name: default
      
      # Node lifetime limit
      expireAfter: 720h 
      
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
            - spot
            
        # Budget-safe B-Series instances
        - key: karpenter.azure.com/sku-family
          operator: In
          values: 
            - B
        - key: karpenter.azure.com/sku-cpu
          operator: In
          values: 
            - "1"
            - "2"
            - "4"
            
  # Budget limits
  limits:
    cpu: "10"
    memory: 20Gi
    
  disruption:
    # ◄ FIXED: Exact string required by v1
    consolidationPolicy: WhenEmptyOrUnderutilized 
    # ◄ FIXED: Required cool-down timer added
    consolidateAfter: 1m