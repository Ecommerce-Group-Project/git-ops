apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.azure.com
        kind: AKSNodeClass
        name: default

      requirements:
        # ------------------------------------------------------------------
        # INSTANCE CATEGORY FILTER (Burstable / Free-Tier Friendly)
        # ------------------------------------------------------------------
        # In AWS, burstable instances are the "t" family (t2, t3, etc.)
        # In Azure, burstable instances are the "B" family (B2s, B1ms, etc.)
        # ------------------------------------------------------------------
        - key: "karpenter.azure.com/sku-family"
          operator: In
          values: ["B"]

        # ------------------------------------------------------------------
        # INSTANCE CPU FILTER
        # ------------------------------------------------------------------
        # Limits hardware sizes to 1 or 2 vCPUs to prevent runaway costs.
        # ------------------------------------------------------------------
        - key: "karpenter.azure.com/sku-cpu"
          operator: In
          values: ["1", "2"]

        # ------------------------------------------------------------------
        # INSTANCE GENERATION FILTER
        # ------------------------------------------------------------------
        # Targets SKU version/generation 2 and newer.
        # ------------------------------------------------------------------
        - key: "karpenter.azure.com/sku-version"
          operator: Gte
          values: ["2"]

        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

  # ----------------------------------------------------------------------
  # NODE CAPACITY LIMIT
  # ----------------------------------------------------------------------
  limits:
    cpu: 20

  # ----------------------------------------------------------------------
  # DISRUPTION SETTINGS (FinOps Node Consolidation)
  # ----------------------------------------------------------------------
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s