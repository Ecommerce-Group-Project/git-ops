controller:
  replicaCount: 1
  
  # REMOVED: use-proxy-protocol is removed because Azure Load Balancers 
  # do not append proxy protocol v2 headers. Leaving it true will cause traffic to fail.
  config: {}

  tolerations:
    - key: "CriticalAddonsOnly"
      operator: "Exists"
      effect: "NoSchedule"

  service:
    type: LoadBalancer
    
    # THE AZURE FIX FOR REAL CLIENT IP:
    # This prevents Kubernetes from performing SNAT on incoming traffic. 
    # NGINX will now natively read the genuine client IP inside your logs and X-Forwarded-For headers.
    externalTrafficPolicy: Local

    targetPorts:
      http: http

    # REMOVED: All service.beta.kubernetes.io/aws-* annotations are stripped.
    # No annotations are required here because Azure AKS defaults to a public, 
    # cross-zone, high-performance Internet-facing Load Balancer automatically!
    annotations: {}