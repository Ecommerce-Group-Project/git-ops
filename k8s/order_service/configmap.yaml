  DB_PORT: "5432"
  DB_NAME: "order_db"
  DB_SSL_MODE: "require"
  SPRING_RABBITMQ_HOST: "rabbitmq" 
  SPRING_RABBITMQ_PORT: "5672"
  SPRINGDOC_API_DOCS_ENABLED: "false"
  SPRINGDOC_SWAGGER_UI_ENABLED: "false"