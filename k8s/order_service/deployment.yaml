apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: app
spec:
  selector:
    app: order-service
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082
  template:
    spec:
      containers:
        - image: wicky2001/order_service:8959376cc9b4e4d4a356db805b88928e0c46f889
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-deployment
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service-container
          image: wicky2001/order_service:8959376cc9b4e4d4a356db805b88928e0c46f889
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          envFrom:
            - secretRef:
                name: order-service-secret
            - configMapRef:
                name: order-service-config-map
