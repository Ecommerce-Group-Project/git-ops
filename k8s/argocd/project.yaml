apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ep-group-project
  namespace: argocd
spec:
  description: "Security sandbox container for the E-commerce Microservices Platform"
  
  sourceRepos:
    - 'https://github.com/Ecommerce-Group-Project/git-ops.git'

  destinations:
    - namespace: app     
      server: https://kubernetes.default.svc
    - namespace: argocd  
      server: https://kubernetes.default.svc


  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'