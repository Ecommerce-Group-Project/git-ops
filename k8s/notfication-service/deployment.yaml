apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: e-commerce
spec:
  selector:
    app: notification-service
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service-deployment
  namespace: e-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service-container
          image: enterprisegroupprojectregistry.azurecr.io/notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          envFrom:
            - secretRef:
                name: notification-service-secret
            - configMapRef:
                name: notification-service-config-map